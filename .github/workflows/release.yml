name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Verify release version
        run: |
          version="$(cargo +1.97.0 metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "decentchat") | .version')"
          test "v${version}" = "${GITHUB_REF_NAME}"
      - name: Test workspace
        run: cargo +1.97.0 test --workspace --locked

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --target "${{ matrix.target }}"
      - name: Build release binary
        run: cargo +1.97.0 build --release --locked --target "${{ matrix.target }}" -p decentchat
      - name: Verify binary
        run: "target/${{ matrix.target }}/release/decentchat --version"
      - name: Package binary
        shell: bash
        run: |
          staging="decentchat-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/decentchat" README.md LICENSE "$staging/"
          tar -czf "decentchat-${{ matrix.target }}.tar.gz" -C "$staging" decentchat README.md LICENSE
      - uses: actions/upload-artifact@v4
        with:
          name: decentchat-${{ matrix.target }}
          path: decentchat-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum decentchat-*.tar.gz > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
